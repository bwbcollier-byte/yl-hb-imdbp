name: IMDbPro CRM Enrichment

on:
  workflow_dispatch:
    inputs:
      IMDBPRO_COOKIE:
        description: 'IMDbPro Session Cookie (Optional: Override secrets)'
        required: false
        type: string
  schedule:
    # Run once daily at midnight UTC
    - cron: "0 0 * * *"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Long timeout to accommodate rate-limited scraping

    steps:
      - name: Notify Supabase — start
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "START_TIME=$(date +%s)" >> $GITHUB_ENV
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"p_workflow_id": 242738158, "p_status": "running", "p_run_id": "${{ github.run_id }}"  }'
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Run CRM Enrichment Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMDBPRO_COOKIE: ${{ github.event.inputs.IMDBPRO_COOKIE || secrets.IMDBPRO_COOKIE }}
          IMDBPRO_USER_AGENT: ${{ secrets.IMDBPRO_USER_AGENT }}
          IMDBPRO_SESSION_ID: ${{ secrets.IMDBPRO_SESSION_ID }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_RECORD_ID: reci8liOZAVmuhcmz
        run: |
          chmod +x overnight-imdb-contacts.sh
          ./overnight-imdb-contacts.sh
      - name: Notify Supabase — result
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DURATION=$(( $(date +%s) - $START_TIME ))
          STATUS="${{ job.status }}"
          PAYLOAD=$(printf '{"p_workflow_id": 242738158, "p_status": "%s", "p_duration_secs": %s, "p_run_id": "${{ github.run_id }}"}' "$STATUS" "$DURATION")
          curl -s -X POST "$SUPABASE_URL/rest/v1/rpc/log_workflow_run" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
