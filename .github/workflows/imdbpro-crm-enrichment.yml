name: IMDbPro CRM Enrichment

on:
  workflow_dispatch:
    inputs:
      IMDBPRO_COOKIE:
        description: 'IMDbPro Session Cookie (Optional: Override secrets)'
        required: false
        type: string
  schedule:
    # Run once daily at midnight UTC
    - cron: "0 0 * * *"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Long timeout to accommodate rate-limited scraping

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Run CRM Enrichment Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMDBPRO_COOKIE: ${{ github.event.inputs.IMDBPRO_COOKIE || secrets.IMDBPRO_COOKIE }}
          IMDBPRO_USER_AGENT: ${{ secrets.IMDBPRO_USER_AGENT }}
          IMDBPRO_SESSION_ID: ${{ secrets.IMDBPRO_SESSION_ID }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_RECORD_ID: reci8liOZAVmuhcmz
        run: node imdbpro-crm-induction.js
