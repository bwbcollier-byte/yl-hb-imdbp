name: IMDbPro Company Enrichment

on:
  workflow_dispatch:
    inputs:
      IMDBPRO_COOKIE:
        description: 'IMDbPro Session Cookie (Optional: Override secrets)'
        required: false
        type: string
  schedule:
    # Run once daily at 01:00 UTC (1 hour after Contacts one)
    - cron: "0 1 * * *"

jobs:
  enrich_companies:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Long timeout to accommodate rate-limited scraping chunks

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Install Chrome
        run: npx puppeteer browsers install chrome

      - name: Run CRM Company Enrichment Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMDBPRO_COOKIE: ${{ github.event.inputs.IMDBPRO_COOKIE || secrets.IMDBPRO_COOKIE }}
          IMDBPRO_USER_AGENT: ${{ secrets.IMDBPRO_USER_AGENT }}
          IMDBPRO_SESSION_ID: ${{ secrets.IMDBPRO_SESSION_ID }}
        run: |
          chmod +x overnight-imdb-companies.sh
          ./overnight-imdb-companies.sh
