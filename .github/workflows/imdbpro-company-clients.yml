name: IMDbPro Company Clients

on:
  schedule:
    - cron: '0 5 * * *' # Daily at 05:00 UTC
  workflow_dispatch:

jobs:
  client-extraction:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx puppeteer browsers install chrome

      - name: Run Client Roster Extraction
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMDBPRO_COOKIE: ${{ secrets.IMDBPRO_COOKIE }}
          CLIENTS_MAX_PAGES: '10'
        run: |
          chmod +x overnight-imdb-clients.sh
          ./overnight-imdb-clients.sh
